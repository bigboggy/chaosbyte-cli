# The flagship Vibespace room. Loaded automatically by the SSH server when
# a connection arrives at the vibespace slug. Other teams have a similar
# file under the same directory; each file's slug is the filename minus
# the .toml extension unless a slug is set explicitly.

slug = "vibespace"

[brand]
name    = "vibespace"
motd    = "the workshop is open. :help when you need it. :leave when you go."
tagline = "a small room for those who are paying attention."

[theme]
# Flagship palette: the original "boggy" theme (registered in code by name).
# Users can switch to "workshop" or any other registered theme via /themes
# inside the room. Editing values here only changes the team's default.
bg        = "#1a1b26"
fg        = "#c0caf5"
muted     = "#565f89"
accent    = "#7aa2f7"
accent2   = "#bb9af7"
border_hi = "#7aa2f7"
border_lo = "#3b4261"

[mod]
nick                  = "@mod"
welcome               = "welcome, {nick}. the workshop is yours for as long as you like."
prompt_interval_secs  = 90
idle_threshold_secs   = 45

[surfaces]
chat        = true
spotlight   = true
games       = true
skills      = false
discussions = false

[spotlight]
name        = "tinytty"
author      = "rin"
description = "a 4kb terminal renderer"
repo_url    = "git.sr.ht/~rin/tinytty"
