<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>chaosbyte / monobyte</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #050507;
        font-family: "IBM Plex Mono", ui-monospace, Menlo, monospace;
        color: #e6dccb;
        font-feature-settings: "calt" 0, "liga" 0;
      }
      /* chaosbyte tokens. seven names, the surface lives in two of them. */
      :root {
        --ground: #08080a;
        --surface: #0f0f13;
        --edge: #1c1c22;
        --rule: #25252d;
        --body: #e6dccb;
        --bright: #f0e8d3;
        --muted: #7d7a72;
        --dim: #4a4842;
        --copper: #c46b3a;
        --copper-deep: #8a4a26;
        --gold: #b3962a;
        --fault: #a02d1f;
      }
      @keyframes cbBlink {
        0%, 50% { opacity: 0.55 }
        50.01%, 100% { opacity: 0 }
      }
      @keyframes cbDecay {
        0%   { background: rgba(196, 107, 58, 0.18) }
        100% { background: rgba(196, 107, 58, 0) }
      }
      @keyframes cbType {
        from { clip-path: inset(0 100% 0 0) }
        to   { clip-path: inset(0 0 0 0) }
      }
      @keyframes cbEmerge {
        0%   { letter-spacing: 0.6em; opacity: 0.2 }
        70%  { letter-spacing: 0.6em; opacity: 0.2 }
        100% { letter-spacing: 0;     opacity: 1 }
      }
      @keyframes cbUnderline {
        0%, 70% { transform: scaleX(0); }
        100%    { transform: scaleX(1); }
      }
      @keyframes cbTick {
        from { transform: translateX(0) }
        to   { transform: translateX(-50%) }
      }
      @keyframes cbRise {
        0%   { transform: translateY(8px); opacity: 0 }
        100% { transform: translateY(0);    opacity: 1 }
      }
      @keyframes cbScan {
        0%   { transform: translateY(-100%) }
        100% { transform: translateY(100%) }
      }
    </style>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Preview server gates subresource fetches behind ?t=. Top-level
      // navigation carries the token, <script src> drops it, so fetch each
      // .jsx with the token stamped on, transform with Babel, eval inline.
      (function () {
        var token = new URLSearchParams(location.search).get("t");
        var q = token ? "?t=" + token : "";
        var files = ["design-canvas.jsx", "screens.jsx", "canvas.jsx"];
        function waitFor(test, then) {
          if (test()) return then();
          setTimeout(function () { waitFor(test, then); }, 30);
        }
        waitFor(
          function () { return window.Babel && window.React && window.ReactDOM; },
          function () {
            (async function () {
              for (var i = 0; i < files.length; i++) {
                var src = files[i] + q;
                try {
                  var res = await fetch(src);
                  var text = await res.text();
                  var out = window.Babel.transform(text, {
                    presets: ["react"],
                    filename: files[i],
                  }).code;
                  (0, eval)(out);
                } catch (e) {
                  console.error("failed loading", files[i], e);
                  var pre = document.createElement("pre");
                  pre.style.cssText =
                    "padding:24px;color:#a02d1f;font-family:ui-monospace,monospace;white-space:pre-wrap";
                  pre.textContent = files[i] + ":\n" + (e && e.stack || e);
                  document.body.appendChild(pre);
                  return;
                }
              }
            })();
          }
        );
      })();
    </script>
  </body>
</html>
